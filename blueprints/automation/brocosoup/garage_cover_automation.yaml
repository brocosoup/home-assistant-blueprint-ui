blueprint:
  name: "🚪 Garage Cover Automation v1.0"
  author: brocosoup
  description: >-
    🌤️ This blueprint gives your garage cover a smart, weather-aware behavior.

    It can open or close based on distance, temperature, lightning risk, and a
    manual authorization switch.
  source_url: https://github.com/brocosoup/home-assistant-blueprint-ui/blob/main/blueprints/automation/brocosoup/garage_cover_automation.yaml
  domain: automation
  input:
    garage_section:
      name: "🚪 Garage Cover"
      icon: mdi:garage
      description: >-
        Choose the cover entity and the helper that allows or blocks automatic
        movement.
      collapsed: true
      input:
        garage_cover:
          name: "🚪 Garage cover"
          description: The garage cover entity to control.
          selector:
            entity:
              domain:
                - cover
              multiple: false
        authorization_switch:
          name: "🔐 Authorization switch"
          description: Boolean that authorizes automatic garage movement.
          selector:
            entity:
              domain:
                - input_boolean
              multiple: false
    distance_section:
      name: "📏 Distance Logic"
      icon: mdi:ruler
      description: >-
        Set the distance thresholds used to decide whether the garage should open
        or close.
      collapsed: true
      input:
        distance_sensor:
          name: "📍 Nearest house distance"
          description: Sensor giving the nearest house distance.
          selector:
            entity:
              domain:
                - sensor
              multiple: false
        distance_open_threshold:
          name: "⬅️ Opening distance threshold"
          default: 200
          selector:
            number:
              min: 0
              max: 1000
              step: 1
              unit_of_measurement: m
              mode: box
        distance_close_threshold:
          name: "➡️ Closing distance threshold"
          default: 500
          selector:
            number:
              min: 0
              max: 1000
              step: 1
              unit_of_measurement: m
              mode: box
    weather_section:
      name: "🌡️🌩️ Temperature & Weather"
      icon: mdi:weather-partly-cloudy
      description: >-
        Fine-tune the comfort temperature thresholds and the lightning safety
        margin.
      collapsed: true
      input:
        outside_temp_sensor:
          name: "🌤️ Outdoor temperature"
          description: Sensor used for the outside temperature comparison.
          selector:
            entity:
              domain:
                - sensor
              multiple: false
        garage_temp_sensor:
          name: "🏠 Garage temperature"
          description: Sensor used for the garage temperature comparison.
          selector:
            entity:
              domain:
                - sensor
              multiple: false
        temp_comfort_threshold:
          name: "🌡️ Comfort temperature threshold"
          default: 18
          selector:
            number:
              min: -30
              max: 40
              step: 0.5
              unit_of_measurement: °C
              mode: box
        temp_open_threshold:
          name: "🌤️ Opening temperature threshold"
          default: 16
          selector:
            number:
              min: -30
              max: 40
              step: 0.5
              unit_of_measurement: °C
              mode: box
        temp_warm_threshold:
          name: "☀️ Warm temperature threshold"
          default: 23
          selector:
            number:
              min: -30
              max: 40
              step: 0.5
              unit_of_measurement: °C
              mode: box
        lightning_distance_sensor:
          name: "⚡ Lightning distance"
          description: Sensor giving lightning distance.
          selector:
            entity:
              domain:
                - sensor
              multiple: false
        lightning_danger_threshold:
          name: "🚨 Lightning danger threshold"
          default: 20
          selector:
            number:
              min: 0
              max: 200
              step: 1
              unit_of_measurement: km
              mode: box
        lightning_safe_threshold:
          name: "🛡️ Lightning safe threshold"
          default: 81
          selector:
            number:
              min: 0
              max: 200
              step: 1
              unit_of_measurement: km
              mode: box
    timing_section:
      name: "⏱️ Timing"
      icon: mdi:timer-cog
      description: >-
        Set the cooldown between checks and the sunrise/sunset window used by
        the sun-based logic.
      collapsed: true
      input:
        sun_open_after_offset:
          name: "☀️ Open window starts after sunrise"
          description: "Use HH:MM or HH:MM:SS, for example 00:30"
          default: "00:30"
          selector:
            time: {}
        sun_open_before_offset:
          name: "🌅 Open window ends before sunset"
          description: "Use HH:MM or HH:MM:SS, for example 00:15"
          default: "00:15"
          selector:
            time: {}
        sun_close_after_offset:
          name: "🌙 Close window starts after sunset"
          description: "Use HH:MM or HH:MM:SS with a leading minus sign, for example -00:15"
          default: "-00:15"
          selector:
            text: {}
        sun_close_before_offset:
          name: "🌤️ Close window ends before sunrise"
          description: "Use HH:MM or HH:MM:SS, for example 00:30"
          default: "00:30"
          selector:
            time: {}
        nominal_open_position:
          name: "🎯 Nominal opening position"
          default: 50
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: box
        position_tolerance_percent:
          name: "± Position tolerance"
          default: 1
          selector:
            number:
              min: 0
              max: 20
              step: 1
              unit_of_measurement: "%"
              mode: box
        cooldown_minutes:
          name: "⏳ Cooldown before a new check"
          default: 45
          selector:
            number:
              min: 0
              max: 180
              step: 1
              unit_of_measurement: min
              mode: box

mode: single
trigger:
  - platform: state
    entity_id: !input outside_temp_sensor
    id: temp_outdoor
  - platform: state
    entity_id: !input garage_temp_sensor
    id: temp_garage
  - platform: time_pattern
    minutes: "/15"
    id: check_periodique
  - platform: numeric_state
    entity_id: !input distance_sensor
    above: !input distance_close_threshold
    id: distance_loin
  - platform: state
    entity_id: !input authorization_switch
    id: buttonn
  - platform: numeric_state
    entity_id: !input lightning_distance_sensor
    below: !input lightning_danger_threshold
    id: foudre_danger
condition:
  - condition: or
    conditions:
      - condition: trigger
        id:
          - foudre_danger
          - distance_loin
      - condition: or
        conditions:
          - condition: template
            value_template: >-
              {{ (now() - states[garage_cover].last_changed).total_seconds() > (cooldown_minutes | int) * 60 }}
          - condition: trigger
            id:
              - buttonn
action:
  - choose:
      - conditions:
          - condition: and
            conditions:
              - condition: state
                entity_id: !input garage_cover
                state: open
              - condition: template
                value_template: >-
                  {% set current_position = state_attr(garage_cover, 'current_position') | int(0) %}
                  {% set target_position = nominal_open_position | int(50) %}
                  {% set tolerance = position_tolerance_percent | int(1) %}
                  {{ target_position - tolerance < current_position < target_position + tolerance }}
              - condition: or
                conditions:
                  - condition: state
                    entity_id: !input authorization_switch
                    state: "off"
                  - condition: template
                    value_template: >-
                      {% set outside = states(temp_ext) | float(0) %}
                      {% set garage = states(temp_garage) | float(0) %}
                      {{ outside > garage and outside > temp_seuil_confort }}
                  - condition: template
                    value_template: >-
                      {% set outside = states(temp_ext) | float(0) %}
                      {% set garage = states(temp_garage) | float(0) %}
                      {{ outside < garage and outside < temp_seuil_confort }}
        sequence:
          - service: cover.close_cover
            target:
              entity_id: !input garage_cover
        alias: Fermeture Nominale
      - conditions:
          - condition: and
            conditions:
              - condition: not
                conditions:
                  - condition: state
                    entity_id: !input garage_cover
                    state: open
              - condition: numeric_state
                entity_id: !input distance_sensor
                below: !input distance_open_threshold
              - condition: sun
                after: sunrise
                after_offset: !input sun_open_after_offset
                before: sunset
                before_offset: !input sun_open_before_offset
              - condition: state
                entity_id: !input authorization_switch
                state: "on"
              - condition: or
                conditions:
                  - condition: numeric_state
                    entity_id: !input lightning_distance_sensor
                    above: !input lightning_safe_threshold
                  - condition: state
                    entity_id: !input lightning_distance_sensor
                    state: unknown
                  - condition: state
                    entity_id: !input lightning_distance_sensor
                    state: unavailable
              - condition: or
                conditions:
                  - condition: template
                    value_template: >-
                      {% set outside = states(temp_ext) | float(0) %}
                      {% set garage = states(temp_garage) | float(0) %}
                      {{ temp_seuil_ouverture < outside < garage }}
                  - condition: template
                    value_template: >-
                      {% set outside = states(temp_ext) | float(0) %}
                      {% set garage = states(temp_garage) | float(0) %}
                      {{ outside < temp_seuil_ouverture and outside > garage }}
        sequence:
          - service: cover.set_cover_position
            data:
              position: !input nominal_open_position
            target:
              entity_id: !input garage_cover
        alias: Ouverture Nominale
      - conditions:
          - condition: or
            conditions:
              - condition: and
                conditions:
                  - condition: or
                    conditions:
                      - condition: numeric_state
                        entity_id: !input distance_sensor
                        above: !input distance_open_threshold
                      - condition: sun
                        after: sunset
                        after_offset: !input sun_close_after_offset
                        before: sunrise
                        before_offset: !input sun_close_before_offset
                      - condition: and
                        conditions:
                          - condition: trigger
                            id: buttonn
                          - condition: state
                            entity_id: !input authorization_switch
                            state: "off"
                      - condition: numeric_state
                        entity_id: !input lightning_distance_sensor
                        below: !input lightning_danger_threshold
                  - condition: not
                    conditions:
                      - condition: state
                        entity_id: !input garage_cover
                        state: closed
        sequence:
          - service: cover.close_cover
            target:
              entity_id: !input garage_cover
        alias: Fermeture d'urgence
variables:
  garage_cover: !input garage_cover
  distance_proche: !input distance_sensor
  distance_seuil_ouverture: !input distance_open_threshold
  distance_seuil_fermeture: !input distance_close_threshold
  temp_ext: !input outside_temp_sensor
  temp_garage: !input garage_temp_sensor
  temp_seuil_confort: !input temp_comfort_threshold
  temp_seuil_ouverture: !input temp_open_threshold
  temp_seuil_chaud: !input temp_warm_threshold
  foudre_distance: !input lightning_distance_sensor
  foudre_seuil_danger: !input lightning_danger_threshold
  foudre_seuil_sur: !input lightning_safe_threshold
  autorisation_garage: !input authorization_switch
  nominal_open_position: !input nominal_open_position
  position_tolerance_percent: !input position_tolerance_percent
  cooldown_minutes: !input cooldown_minutes
